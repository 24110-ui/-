<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Future Me AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#e3f2fd,#fce4ec);
  padding:30px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  border-radius:25px;
  padding:30px;
  box-shadow:0 15px 35px rgba(0,0,0,.15);
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#777;
  margin-bottom:25px;
}

.hidden{
  display:none;
}

input,
textarea,
select{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  margin-top:8px;
  margin-bottom:14px;
  font-size:15px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

.login-btn{
  background:#42a5f5;
  color:white;
}

.signup-btn{
  background:#7e57c2;
  color:white;
}

.logout-btn{
  background:#455a64;
  color:white;
}

.ask-btn{
  background:#42a5f5;
  color:white;
}

.tts-btn{
  background:#7e57c2;
  color:white;
}

.profile-btn{
  background:#66bb6a;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
}

.card{
  background:#f8fafc;
  border-radius:16px;
  padding:18px;
  margin-bottom:20px;
}

.answer-box{
  min-height:180px;
  white-space:pre-wrap;
  line-height:1.7;
}

.chat-item{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  border:1px solid #eee;
}

.status{
  margin-top:10px;
  color:#666;
}

.auth-box{
  max-width:450px;
  margin:auto;
}

.user-email{
  font-size:14px;
  color:#666;
}

audio{
  width:100%;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌟 Future Me AI</h1>

<div class="subtitle">
10년 후의 나와 대화하는 AI 서비스
</div>

<!-- 로그인 화면 -->

<div id="authSection">

<div class="auth-box">

<input
id="emailInput"
type="email"
placeholder="이메일">

<input
id="passwordInput"
type="password"
placeholder="비밀번호">

<button
class="login-btn"
id="loginBtn">
로그인
</button>

<br><br>

<button
class="signup-btn"
id="signupBtn">
회원가입
</button>

</div>

</div>

<!-- 메인 화면 -->

<div id="mainSection" class="hidden">

<div class="topbar">

<div>
<div>로그인 계정</div>
<div
class="user-email"
id="userEmail">
</div>
</div>

<button
class="logout-btn"
id="logoutBtn">
로그아웃
</button>

</div>

<!-- 프로필 -->

<div class="card">

<h3>내 정보</h3>

<input
id="dreamInput"
placeholder="나의 꿈 (예: AI 개발자)">

<textarea
id="worryInput"
placeholder="현재 고민을 입력하세요">
</textarea>

<button
class="profile-btn"
id="saveProfileBtn">
프로필 저장
</button>

</div>

<!-- 질문 -->

<div class="card">

<h3>미래의 나에게 질문하기</h3>

<textarea
id="questionInput"
placeholder="예: 원하는 대학에 갈 수 있을까?">
</textarea>

<button
class="ask-btn"
id="askBtn">
질문하기
</button>

<div
class="status"
id="statusBox">
</div>

</div>

<!-- 답변 -->

<div class="card">

<h3>미래의 나의 답변</h3>

<div
class="answer-box"
id="answerBox">

아직 답변이 없습니다.

</div>

<br>

<button
class="tts-btn"
id="ttsBtn">
🔊 음성으로 듣기
</button>

<audio
id="audioPlayer"
controls>
</audio>

</div>

<!-- 기록 -->

<div class="card">

<h3>대화 기록</h3>

<div id="chatHistory">

기록이 없습니다.

</div>

</div>

</div>
<script type="module">

const TTS_URL =
"https://script.google.com/macros/s/AKfycbxzvCeCidpIBm3Ez_AbmzTRrvzCkPa_7x-irAazDPzljPmuqjjHZOqXxfyS1vNh7tX1/exec";

/* =========================
   요소 가져오기
========================= */

const authSection =
document.getElementById("authSection");

const mainSection =
document.getElementById("mainSection");

const emailInput =
document.getElementById("emailInput");

const passwordInput =
document.getElementById("passwordInput");

const loginBtn =
document.getElementById("loginBtn");

const signupBtn =
document.getElementById("signupBtn");

const logoutBtn =
document.getElementById("logoutBtn");

const userEmail =
document.getElementById("userEmail");

const dreamInput =
document.getElementById("dreamInput");

const worryInput =
document.getElementById("worryInput");

const saveProfileBtn =
document.getElementById("saveProfileBtn");

const askBtn =
document.getElementById("askBtn");

const questionInput =
document.getElementById("questionInput");

const answerBox =
document.getElementById("answerBox");

const statusBox =
document.getElementById("statusBox");

document.getElementById("chatHistory");

const ttsBtn =

   현재 로그인 사용자

/* =========================
   프로필 저장
========================= */

saveProfileBtn.addEventListener(
"click",
async()=>{

  if(!currentUser){
    alert("로그인 필요");
    return;
  }

  try{

    await set(
      ref(db,`profiles/${currentUser.uid}`),
      {
        dream:dreamInput.value,
        worry:worryInput.value
      }
    );

    alert("프로필 저장 완료");

  }catch(error){

    alert("저장 실패");

  }

}
);

/* =========================
   GPT 질문
========================= */

askBtn.addEventListener(
"click",
askFutureMe
);

async function askFutureMe(){

  if(!currentUser){
    alert("로그인 필요");
    return;
  }

  const question =
  questionInput.value.trim();

  if(!question){
    alert("질문 입력");
    return;
  }

  try{

    statusBox.textContent =
    "미래의 내가 답변 작성 중...";

    const prompt = `
너는 사용자의 10년 후 미래 모습이다.

현재 꿈:
${dreamInput.value}

현재 고민:
${worryInput.value}

질문:
${question}

10년 후의 내가
친근하게 조언해줘.
`;

    const response =
    await fetch(
      GPT_URL,
      {
        method:"POST",
        body:JSON.stringify({
          question:prompt
        })
      }
    );

    const data =
    await response.json();

    const answer =
    data.answer || "답변 없음";

    answerBox.textContent =
    answer;

    statusBox.textContent =
    "답변 생성 완료";

    saveChat(question,answer);

  }catch(error){

    console.error(error);

    statusBox.textContent =
    "오류 발생";

  }

}

/* =========================
   대화 저장
========================= */

async function saveChat(
question,
answer
){

  const chatRef =
  push(
    ref(
      db,
      `chats/${currentUser.uid}`
    )
  );

  await set(chatRef,{
    question,
    answer,
    createdAt:
    new Date().toLocaleString()
  });

}

/* =========================
   대화 불러오기
========================= */

function loadChats(uid){

  const chatRef =
  ref(db,`chats/${uid}`);

  onValue(chatRef,(snapshot)=>{

    const data =
    snapshot.val();

    if(!data){

      chatHistory.innerHTML =
      "기록이 없습니다.";

      return;
    }

    let html = "";

    Object.values(data)
    .reverse()
    .forEach(chat=>{

      html += `
      <div class="chat-item">
        <strong>질문</strong><br>
        ${chat.question}
        <hr>
        <strong>답변</strong><br>
        ${chat.answer}
      </div>
      `;

    });

    chatHistory.innerHTML =
    html;

  });

}

/* =========================
   로그인 시 기록 불러오기
========================= */

onAuthStateChanged(
auth,
(user)=>{

  if(user){

    loadChats(user.uid);

  }

});
</script>

</html>
