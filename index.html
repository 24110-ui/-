<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Me AI</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#e3f2fd,#fce4ec);
  padding:30px;
}
.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  border-radius:25px;
  padding:30px;
  box-shadow:0 15px 35px rgba(0,0,0,.15);
}
h1{
  text-align:center;
  margin-bottom:10px;
}
.subtitle{
  text-align:center;
  color:#777;
  margin-bottom:25px;
}
.hidden{
  display:none;
}
input,
textarea,
select{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  margin-top:8px;
  margin-bottom:14px;
  font-size:15px;
  outline: none;
}
textarea{
  min-height:120px;
  resize:vertical;
}
input:focus, textarea:focus, select:focus {
  border-color: #42a5f5;
  box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
}
button, .download-link {
  border: none;
  padding: 12px 18px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
button:hover, .download-link:hover{
  opacity:.9;
  transform: translateY(-1px);
}
button:disabled {
  cursor: not-allowed;
  opacity: 0.6;
  transform: none;
}
.login-btn{ background:#42a5f5; color:white; }
.signup-btn{ background:#7e57c2; color:white; }
.logout-btn{ background:#455a64; color:white; }
.ask-btn{ background:#42a5f5; color:white; }
.tts-btn{ background:#7e57c2; color:white; }
.profile-btn{ background:#66bb6a; color:white; }
.download-link { background:#ec407a; color:white; margin-top: 10px; }

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
}
.card{
  background:#f8fafc;
  border-radius:16px;
  padding:18px;
  margin-bottom:20px;
}
.tts-options {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.answer-box{
  min-height:180px;
  white-space:pre-wrap;
  line-height:1.7;
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #eee;
}
.chat-item{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  border:1px solid #eee;
}
.status{
  margin-top:10px;
  color:#666;
  font-size:14px;
}
.auth-box{
  max-width:450px;
  margin:auto;
}
.user-email{
  font-size:14px;
  color:#666;
}
audio{
  width:100%;
  margin-top:15px;
}
hr {
  margin: 10px 0;
  border: 0;
  border-top: 1px solid #eee;
}
@media (max-width: 600px) {
  .tts-options { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <h1>🌟 Future Me AI</h1>
  <div class="subtitle">10년 후의 나와 대화하는 AI 서비스</div>

  <div id="authSection">
    <div class="auth-box">
      <input id="emailInput" type="email" placeholder="이메일">
      <input id="passwordInput" type="password" placeholder="비밀번호">
      <button class="login-btn" id="loginBtn">로그인</button>
      <br><br>
      <button class="signup-btn" id="signupBtn">회원가입</button>
    </div>
  </div>

  <div id="mainSection" class="hidden">
    <div class="topbar">
      <div>
        <div>로그인 계정</div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>

    <div class="card">
      <h3>내 정보</h3>
      <input id="dreamInput" placeholder="나의 꿈 (예: AI 개발자)">
      <textarea id="worryInput" placeholder="현재 고민을 입력하세요"></textarea>
      <button class="profile-btn" id="saveProfileBtn">프로필 저장</button>
    </div>

    <div class="card">
      <h3>미래의 나에게 질문하기</h3>
      <textarea id="questionInput" placeholder="예: 나는 무얼 하고 있을까?"></textarea>
      <button class="ask-btn" id="askBtn">질문하기</button>
      <div class="status" id="statusBox"></div>
    </div>

    <div class="card">
      <h3>미래의 나의 답변</h3>
      <div class="answer-box" id="answerBox">아직 답변이 없습니다.</div>
      <br>

      <div class="tts-options">
        <select id="modelSelect">
          <option value="tts-1">tts-1 빠른 생성</option>
          <option value="tts-1-hd">tts-1-hd 고품질</option>
        </select>
        <select id="voiceSelect">
          <option value="alloy">alloy (기본 남성)</option>
          <option value="echo">echo</option>
          <option value="fable">fable</option>
          <option value="onyx">onyx (묵직한 남성)</option>
          <option value="nova">nova (밝은 여성)</option>
          <option value="shimmer">shimmer (부드러운 여성)</option>
        </select>
        <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" placeholder="속도" />
      </div>

      <button class="tts-btn" id="ttsBtn">🔊 음성으로 듣기</button>
      <audio id="audioPlayer" controls></audio>
      <a id="downloadLink" class="download-link hidden" href="#">💾 mp3 파일 다운로드</a>
    </div>

    <div class="card">
      <h3>대화 기록</h3>
      <div id="chatHistory">기록이 없습니다.</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =========================
   Firebase 설정
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyDO-v52Ehwphh5gW0WBzu9_DliMhOzy4Yo",
  authDomain: "kang-f4e85.firebaseapp.com",
  databaseURL: "https://kang-f4e85-default-rtdb.firebaseio.com",
  projectId: "kang-f4e85",
  storageBucket: "kang-f4e85.firebasestorage.app",
  messagingSenderId: "107057126084",
  appId: "1:107057126084:web:30f7bcb3f25dd2aa4a0791"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* =========================
   사용자 발급 구글 앱스 스크립트 URL
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbyz0Qjui7TKLSNand2gnrIYqFJZ4hDVt10czffk7o5nFs2C5AIxyaT1U7Wde7DQ04ZB/exec";

/* =========================
   요소 가져오기
========================= */
const authSection = document.getElementById("authSection");
const mainSection = document.getElementById("mainSection");
const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userEmail = document.getElementById("userEmail");
const dreamInput = document.getElementById("dreamInput");
const worryInput = document.getElementById("worryInput");
const saveProfileBtn = document.getElementById("saveProfileBtn");
const askBtn = document.getElementById("askBtn");
const questionInput = document.getElementById("questionInput");
const answerBox = document.getElementById("answerBox");
const statusBox = document.getElementById("statusBox");
const chatHistory = document.getElementById("chatHistory");

// TTS 관련 추가 요소
const ttsBtn = document.getElementById("ttsBtn");
const modelSelect = document.getElementById("modelSelect");
const voiceSelect = document.getElementById("voiceSelect");
const speedInput = document.getElementById("speedInput");
const audioPlayer = document.getElementById("audioPlayer");
const downloadLink = document.getElementById("downloadLink");

let currentUser = null;

/* =========================
   회원가입 / 로그인 / 로그아웃
========================= */
signupBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!email || !password) { alert("이메일과 비밀번호를 입력해주세요."); return; }
  try{ await createUserWithEmailAndPassword(auth, email, password); alert("회원가입 성공!"); }
  catch(error){ alert("회원가입 실패: " + error.message); }
});

loginBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!email || !password) { alert("이메일과 비밀번호를 입력해주세요."); return; }
  try{ await signInWithEmailAndPassword(auth, email, password); }
  catch(error){ alert("로그인 실패: " + error.message); }
});

logoutBtn.addEventListener("click", async () => {
  try { await signOut(auth); } catch(error) { alert("로그아웃 실패: " + error.message); }
});

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    authSection.classList.add("hidden");
    mainSection.classList.remove("hidden");
    userEmail.textContent = user.email;
    loadProfile(user.uid);
    loadChats(user.uid);
  }else{
    currentUser = null;
    authSection.classList.remove("hidden");
    mainSection.classList.add("hidden");
    userEmail.textContent = "";
    dreamInput.value = "";
    worryInput.value = "";
    answerBox.textContent = "아직 답변이 없습니다.";
    audioPlayer.removeAttribute('src');
    downloadLink.classList.add('hidden');
  }
});

/* =========================
   프로필 데이터 관리
========================= */
saveProfileBtn.addEventListener("click", async () => {
  if(!currentUser){ alert("로그인이 필요합니다."); return; }
  try{
    await set(ref(db, `profiles/${currentUser.uid}`), {
      dream: dreamInput.value.trim(),
      worry: worryInput.value.trim()
    });
    alert("프로필이 저장되었습니다.");
  }catch(error){ alert("저장 실패: " + error.message); }
});

async function loadProfile(uid) {
  try {
    const snapshot = await get(ref(db, `profiles/${uid}`));
    if(snapshot.exists()) {
      const data = snapshot.val();
      dreamInput.value = data.dream || "";
      worryInput.value = data.worry || "";
    }
  } catch(error) { console.error(error); }
}

/* =========================
   GPT 질문하기
========================= */
askBtn.addEventListener("click", askFutureMe);

async function askFutureMe(){
  if(!currentUser){ alert("로그인이 필요합니다."); return; }
  const question = questionInput.value.trim();
  if(!question){ alert("질문을 입력해주세요."); return; }

  try{
    statusBox.textContent = "미래의 내가 답변 작성 중...";
    askBtn.disabled = true;
    downloadLink.classList.add('hidden'); // 새 질문 시 다운로드 링크 숨김

    const prompt = `현재 나의 꿈: ${dreamInput.value.trim() || "탐색 중"}
현재 나의 고민: ${worryInput.value.trim() || "없음"}
질문: ${question}`;

    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ type: "gpt", question: prompt })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error);

    const answer = data.answer || "답변을 가져오지 못했습니다.";
    answerBox.textContent = answer;
    statusBox.textContent = "답변 생성 완료";
    
    questionInput.value = ""; 
    saveChat(question, answer);
  }catch(error){
    console.error(error);
    statusBox.textContent = "오류 발생. 다시 시도해주세요.";
  }finally{
    askBtn.disabled = false;
  }
}

/* =========================
   OpenAI 수신 데이터 기반 고품질 TTS 기능
========================= */
ttsBtn.addEventListener("click", async () => {
  const textToSpeak = answerBox.textContent;
  if(!textToSpeak || textToSpeak === "아직 답변이 없습니다.") {
    alert("들을 수 있는 답변이 없습니다.");
    return;
  }

  const model = modelSelect.value;
  const voice = voiceSelect.value;
  const speed = Number(speedInput.value || 1.0);

  if (speed < 0.25 || speed > 4.0) {
    alert('속도는 0.25부터 4.0 사이로 입력해주세요.');
    return;
  }

  try {
    statusBox.textContent = "고품질 음성 버퍼 생성 중...";
    ttsBtn.disabled = true;

    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ 
        type: "tts",
        text: textToSpeak,
        model: model,
        voice: voice,
        speed: speed
      })
    });

    const data = await response.json();
    if(data.error) throw new Error(data.error);
    if (!data.audioBase64) throw new Error('음성 바이너리를 받지 못했습니다.');

    // 올려주신 Base64 오디오 디코딩 변환 로직 탑재
    const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');

    audioPlayer.src = audioUrl;
    audioPlayer.play();

    // 다운로드 링크 연결 및 시각화
    downloadLink.href = audioUrl;
    downloadLink.download = `future-me-ai-${voice}.mp3`;
    downloadLink.classList.remove('hidden');

    statusBox.textContent = "음성 재생 및 다운로드 준비 완료";
  } catch(error) {
    console.error(error);
    alert("음성 변환 실패: " + error.message);
    statusBox.textContent = "음성 생성 오류";
  } finally {
    ttsBtn.disabled = false;
  }
});

function base64ToAudioUrl(base64, mimeType) {
  const byteCharacters = atob(base64);
  const byteArrays = [];
  for (let offset = 0; offset < byteCharacters.length; offset += 512) {
    const slice = byteCharacters.slice(offset, offset + 512);
    const byteNumbers = new Array(slice.length);
    for (let i = 0; i < slice.length; i++) {
      byteNumbers[i] = slice.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNumbers);
    byteArrays.push(byteArray);
  }
  const blob = new Blob(byteArrays, { type: mimeType });
  return URL.createObjectURL(blob);
}

/* =========================
   대화 히스토리 DB 연동
========================= */
async function saveChat(question, answer){
  try {
    const chatRef = push(ref(db, `chats/${currentUser.uid}`));
    await set(chatRef, { question, answer, createdAt: new Date().toLocaleString() });
  } catch(error) { console.error(error); }
}

function loadChats(uid){
  const chatRef = ref(db, `chats/${uid}`);
  onValue(chatRef, (snapshot) => {
    const data = snapshot.val();
    if(!data){ chatHistory.innerHTML = "기록이 없습니다."; return; }

    let html = "";
    Object.values(data).reverse().forEach(chat => {
      html += `
      <div class="chat-item">
        <strong>질문 (${chat.createdAt || ''})</strong><br>${chat.question}<hr>
        <strong>답변</strong><br>${chat.answer}
      </div>`;
    });
    chatHistory.innerHTML = html;
  });
}
</script>
</body>
</html>
